<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Un mensaje para ti</title>
<style>
body{
  background: linear-gradient(135deg,#ff758c,#ff7eb3);
  color:#fff;
  font-family:Arial,sans-serif;
  text-align:center;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  overflow:hidden;
}

h1{
  white-space:pre-wrap;
  font-size:2rem;
  max-width:80%;
  transition:opacity .5s ease;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#fff;
  color:#ff4f81;
  font-size:16px;
  cursor:pointer;
  transition:transform .2s ease;
}

button:hover{ transform:scale(1.05); }
</style>
</head>
<body>

<h1 id="mensaje"></h1>
<button id="btn" onclick="cambiarTexto()">Sigue leyendo y no me dejes en visto (como siempre)</button>

<script>
const mensajes = [
  "Has visto lo que puedo hacer para llamar tu atención...",
  "Lo haría mil veces más solo para llamar tu atención."
];

let index = 0;
let escribiendo = false;

function escribirTexto(texto, callback){
  let i = 0;
  const velocidad = 40;
  const elemento = document.getElementById("mensaje");
  elemento.textContent = "";
  escribiendo = true;

  function escribir(){
    if(i < texto.length){
      elemento.textContent += texto[i];
      i++;
      setTimeout(escribir, velocidad);
    }else{
      escribiendo = false;
      if(callback) callback();
    }
  }
  escribir();
}

function cambiarTexto(){
  if(escribiendo) return;

  index++;
  if(index < mensajes.length){
    escribirTexto(mensajes[index]);
  }else{
    iniciarCuentaAtras();
  }
}

function iniciarCuentaAtras(){
  const elemento = document.getElementById("mensaje");
  let contador = 3;

  function cuenta(){
    if(contador > 0){
      elemento.textContent = contador + "...";
      contador--;
      setTimeout(cuenta, 800);
    }else{
      escribirTexto("Vale… ahora dime que no te he sacado una sonrisa 😌");
      document.getElementById("btn").textContent = "Fin 😌";
      document.getElementById("btn").disabled = true;
      document.getElementById("btn").style.opacity = "0.7";
      document.getElementById("btn").style.cursor = "default";
    }
  }
  cuenta();
}

// Arranca con efecto escribir al cargar
escribirTexto(mensajes[index]);
</script>

</body>
</html>
