<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Un mensaje para ti</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background: linear-gradient(135deg,#ff758c,#ff7eb3);
  color:#fff;
  font-family:Arial,sans-serif;
}

.contenedor{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:30px 20px;
}

h1{
  white-space:pre-wrap;
  font-size:2rem;   /* MISMO tamaño que tenías */
  max-width:80%;
  margin-bottom:20px;
}

img{
  width:420px;
  max-width:90vw;
  margin-top:20px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

button{
  margin-top:25px;
  padding:14px 28px;
  border:none;
  border-radius:30px;
  background:#fff;
  color:#ff4f81;
  font-size:16px;
  cursor:pointer;
  transition:transform .2s ease;
}

button:hover{
  transform:scale(1.05);
}

@media (max-width:768px){

  .contenedor{
    padding:25px 18px 40px;
  }

  img{
    width:85vw;
    max-width:420px;
  }

}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>
<div class="contenedor">
<h1 id="mensaje"></h1>

<img id="freyja" src="freyja.jpeg" style="display:none;">
<img id="pato" src="pato.png" style="display:none;">

<button id="btn" onclick="cambiarTexto()">Sigue leyendo(No pases de mi,como siempre..)</button>

<script>
const mensajes = [
  "Solo tengo algo que decirte... eres Freyja.",
  "Freyja es la diosa nórdica del amor, la magia y la guerra.",
  "Era increíblemente bella, pero también peligrosa.",
  "Tenía una mezcla rara: sensualidad, poder y misterio.",
  "Y ahora dime… ¿cómo se supone que uno no va a fijarse en alguien así?",
  "Así que dime, cuando vengas… ¿podemos ir a cenar?"
];

let index = 0;
let escribiendo = false;

function escribirTexto(texto){
  let i = 0;
  const velocidad = 40;
  const elemento = document.getElementById("mensaje");

  elemento.textContent = "";
  escribiendo = true;

  function escribir(){
    if(i < texto.length){
      elemento.textContent += texto[i];
      i++;
      setTimeout(escribir, velocidad);
    }else{
      escribiendo = false;
    }
  }

  escribir();
}

function cambiarTexto(){
  if(escribiendo) return;

  index++;

  if(index < mensajes.length){
    escribirTexto(mensajes[index]);

    // Ocultar ambas imágenes por defecto
    document.getElementById("freyja").style.display = "none";
    document.getElementById("pato").style.display = "none";

    // Mostrar la foto de ella después de la frase 5
    if(index === 4){
      document.getElementById("freyja").style.display = "block";
    }

    // Mostrar el pato en la frase final
    if(index === 5){
      document.getElementById("freyja").style.display = "none";
      document.getElementById("pato").style.display = "block";
    }

  }else{
    document.getElementById("btn").style.display = "none";
  }
}

escribirTexto(mensajes[index]);
</script>

</body>
</html>
