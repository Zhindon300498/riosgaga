<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Un mensaje para ti</title>
<style>
body {
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    overflow: hidden;
}

h1 {
    font-size: 2rem;
    max-width: 80%;
    transition: opacity 0.5s ease;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4f81;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s ease;
}

button:hover {
    transform: scale(1.1);
}
</style>
</head>
<body>

<h1 id="mensaje">Has visto lo que puedo hacer por ti...</h1>
<button onclick="cambiarTexto()">Sigue leyendo ❤️</button>

<script>
let mensajes = [
"Lo haría mil veces más solo para llamar tu atención.",
"Y eso que todavía no me he puesto creativo...",
"Imagínate lo que haría si me dieras una cita 😉",
"Vale… ahora dime que al menos te he sacado una sonrisa."
];

let index = 0;

function cambiarTexto() {
    if (index < mensajes.length) {
        document.getElementById("mensaje").innerText = mensajes[index];
        index++;
    } else {
        document.getElementById("mensaje").innerText = "Ahora te toca responderme 😌";
    }
}
</script>

</body>
</html>
